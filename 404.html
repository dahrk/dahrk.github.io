<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — dahrk.github.io</title>
  <link rel="stylesheet" href="css/fridge.css" />
  <style>
    .not-found-content {
      animation: slide-up 0.45s ease both;
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .empty-shelf-svg {
      display: block;
      margin: 0 auto 28px;
      opacity: 0.85;
    }
  </style>
</head>
<body class="not-found-body">

  <!-- Fridge-themed 404: an empty shelf inside the fridge -->
  <div class="not-found-content">

    <!-- Small inline SVG: an empty fridge shelf -->
    <svg
      class="empty-shelf-svg"
      viewBox="0 0 320 140"
      width="320"
      height="140"
      xmlns="http://www.w3.org/2000/svg"
      aria-hidden="true"
    >
      <defs>
        <linearGradient id="wallGrad404" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#EEF5FF"/>
          <stop offset="100%" stop-color="#F4F8FF"/>
        </linearGradient>
        <linearGradient id="shelfGrad404" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(180,220,255,0.55)"/>
          <stop offset="100%" stop-color="rgba(150,200,245,0.25)"/>
        </linearGradient>
      </defs>

      <!-- Interior wall -->
      <rect x="0" y="0" width="320" height="140" rx="8" fill="url(#wallGrad404)"/>

      <!-- Ceiling light strip -->
      <rect x="0"  y="0" width="320" height="18" fill="#D8EEFF" rx="8"/>
      <rect x="12" y="3" width="296" height="11" rx="3" fill="rgba(255,255,255,0.85)"/>

      <!-- Left wall shadow -->
      <rect x="0" y="0" width="10" height="140" fill="rgba(0,0,40,0.04)" rx="4"/>
      <!-- Right wall shadow -->
      <rect x="310" y="0" width="10" height="140" fill="rgba(0,0,40,0.04)" rx="4"/>

      <!-- Shelf surface -->
      <rect x="6" y="102" width="308" height="8" rx="3" fill="url(#shelfGrad404)" stroke="#9EC8E8" stroke-width="0.8"/>
      <rect x="6" y="102" width="308" height="2" rx="2" fill="rgba(255,255,255,0.6)"/>
      <rect x="6" y="108" width="308" height="2" rx="1" fill="rgba(0,0,30,0.05)"/>

      <!-- Dust / empty shelf hint — subtle outline of where items might have been -->
      <rect x="28"  y="62" width="40" height="40" rx="3" fill="none" stroke="#D0DCE8" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="88"  y="48" width="55" height="54" rx="3" fill="none" stroke="#D0DCE8" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="165" y="60" width="35" height="42" rx="3" fill="none" stroke="#D0DCE8" stroke-width="1" stroke-dasharray="4,3"/>
      <rect x="225" y="50" width="44" height="52" rx="3" fill="none" stroke="#D0DCE8" stroke-width="1" stroke-dasharray="4,3"/>

      <!-- A lonely cricket / nothing here indicator -->
      <text x="160" y="88" text-anchor="middle" font-size="18" fill="#B8CCE0" font-family="Arial,sans-serif">&#x1F4A8;</text>
    </svg>

    <p  class="not-found-code">404</p>
    <h1 class="not-found-heading">Nothing here&hellip;</h1>
    <p  class="not-found-message">
      Looks like this shelf is empty.<br/>
      The page you&rsquo;re looking for must have been eaten.
    </p>
    <a href="home.html" class="home-link">&#8592; Back to the Fridge</a>
  </div>

</body>
</html>
