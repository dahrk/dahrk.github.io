  <style>
    /* Tooltip labels on nav items */
    .item-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      fill: #5A7A9A;
      pointer-events: none;
      letter-spacing: 0.03em;
    }
    .item-sublabel {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 8px;
      fill: #99AAB8;
      pointer-events: none;
    }
    /* SVG anchor reset */
    svg a { cursor: pointer; }
    svg a:hover { outline: none; }
  </style>
</head>

    <!--
      Inside the fridge — ViewBox 0 0 1000 620
      Left side (0–640):  fridge interior, 3 shelves, 6 nav items
      Right side (645–1000): open door panel with decorative condiments
    -->
    <svg
      class="fridge-interior-svg"

      aria-label="Fridge interior navigation"

        <!-- Interior back wall gradient -->
        <linearGradient id="intWall" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#EEF5FF"/>
          <stop offset="100%" stop-color="#F5F9FF"/>
        </linearGradient>

        <!-- Ceiling light glow -->
        <radialGradient id="ceilGlow" cx="50%" cy="0%" r="70%">
          <stop offset="0%"   stop-color="rgba(210,235,255,0.9)"/>
          <stop offset="100%" stop-color="rgba(238,245,255,0)"/>
        </radialGradient>

        <!-- Glass shelf -->
        <linearGradient id="shelfGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="rgba(200,230,255,0.55)"/>
          <stop offset="50%"  stop-color="rgba(160,210,245,0.35)"/>
          <stop offset="100%" stop-color="rgba(200,230,255,0.2)"/>
        </linearGradient>

        <!-- Door panel background -->
        <linearGradient id="doorPanelGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#D8E8F8"/>
          <stop offset="100%" stop-color="#E4EEF8"/>
        </linearGradient>

        <!-- Milk carton gradient -->
        <linearGradient id="milkGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#FAFAFA"/>
          <stop offset="100%" stop-color="#F0F0F0"/>
        </linearGradient>

        <!-- LinkedIn can gradient -->
        <linearGradient id="liGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#0A66C2"/>
          <stop offset="100%" stop-color="#0952A0"/>
        </linearGradient>

        <!-- Bottle shadow filter -->
        <filter id="itemShadow" x="-20%" y="-10%" width="150%" height="130%">
          <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="rgba(0,0,30,0.15)"/>
        </filter>

        <!-- Can highlight -->
        <linearGradient id="canHighlight" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="rgba(255,255,255,0.25)"/>
          <stop offset="40%"  stop-color="rgba(255,255,255,0.1)"/>
          <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
        </linearGradient>

        <!-- Ketchup gradient -->
        <linearGradient id="ketchupGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#C0392B"/>
          <stop offset="100%" stop-color="#A93226"/>
        </linearGradient>

        <!-- Mustard gradient -->
        <linearGradient id="mustardGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#E8C93A"/>
          <stop offset="100%" stop-color="#D4B428"/>
        </linearGradient>
      </defs>
