<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dahrk.github.io</title>
  <link rel="stylesheet" href="css/fridge.css" />
  <style>
    .fridge-svg-wrap {
      animation: fadein 0.9s ease both;
    }
    .landing-hint {
      animation: fadein 1.8s ease 0.6s both;
    }
    @keyframes fadein {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="landing-body">

  <div class="fridge-svg-wrap">
    <a href="home.html" class="fridge-door-wrapper" aria-label="Open the fridge and enter">
      <!--
        Refrigerator door — hinge on RIGHT, handle on LEFT.
        The .fridge-door-group rotates from its right edge on hover,
        simulating the door swinging open.
      -->
      <svg
        viewBox="0 0 400 620"
        width="280"
        height="434"
        xmlns="http://www.w3.org/2000/svg"
        aria-hidden="true"
        overflow="visible"
      >
        <defs>
          <linearGradient id="doorGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#F4F4F4"/>
            <stop offset="55%"  stop-color="#ECECEC"/>
            <stop offset="100%" stop-color="#D8D8D8"/>
          </linearGradient>
          <linearGradient id="freezerGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#EEF2F8"/>
            <stop offset="55%"  stop-color="#E4E8F0"/>
            <stop offset="100%" stop-color="#D0D8E4"/>
          </linearGradient>
          <linearGradient id="handleGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stop-color="#D0D0D0"/>
            <stop offset="40%"  stop-color="#A8A8A8"/>
            <stop offset="100%" stop-color="#C4C4C4"/>
          </linearGradient>
          <linearGradient id="hingeGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#989898"/>
            <stop offset="100%" stop-color="#B8B8B8"/>
          </linearGradient>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#C4C4C4"/>
            <stop offset="100%" stop-color="#B2B2B2"/>
          </linearGradient>
          <linearGradient id="intGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%"   stop-color="#C8E4FF"/>
            <stop offset="100%" stop-color="#E8F4FF"/>
          </linearGradient>
          <radialGradient id="floorShadow" cx="50%" cy="100%" r="45%">
            <stop offset="0%"   stop-color="rgba(0,0,0,0.16)"/>
            <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
          </radialGradient>
        </defs>

        <!-- Floor shadow -->
        <ellipse cx="200" cy="618" rx="155" ry="9" fill="url(#floorShadow)"/>

        <!-- Fridge body / casing (static, stays in place) -->
        <rect x="58" y="12" width="296" height="598" rx="22" fill="url(#bodyGrad)"/>

        <!-- Interior color peek — visible on right when door is closed -->
        <rect x="330" y="17" width="18" height="593" rx="4" fill="url(#intGrad)"/>

        <!-- ── Animated door group — both panels rotate together ── -->
        <g class="fridge-door-group">

          <!-- ▌Main refrigerator door (top ~67%) -->
          <rect x="63" y="17"  width="269" height="397" rx="16" fill="url(#doorGrad)"/>
          <!-- Edge shadow (left) -->
          <rect x="63" y="17"  width="4"   height="397" rx="2"  fill="rgba(0,0,0,0.05)"/>
          <!-- Edge shadow (bottom seam) -->
          <rect x="63" y="410" width="269" height="4"   rx="2"  fill="rgba(0,0,0,0.05)"/>
          <!-- Recessed inner panel -->
          <rect x="82" y="36"  width="232" height="358" rx="10"
                fill="none" stroke="#D0D0D0" stroke-width="1.5"/>
          <!-- Panel inset top/left shadows -->
          <rect x="82" y="36"  width="232" height="2"   rx="1" fill="rgba(0,0,0,0.03)"/>
          <rect x="82" y="36"  width="2"   height="358" rx="1" fill="rgba(0,0,0,0.03)"/>
          <!-- Decorative horizontal grooves -->
          <line x1="92" y1="185" x2="305" y2="185" stroke="#D8D8D8" stroke-width="0.8"/>
          <line x1="92" y1="215" x2="305" y2="215" stroke="#D8D8D8" stroke-width="0.8"/>
          <!-- Brand accent stripe -->
          <rect x="63" y="388" width="269" height="26" fill="#E0E0E0"/>
          <rect x="63" y="388" width="269" height="1"  fill="#CACACA"/>
          <!-- Handle — vertical, LEFT side -->
          <rect x="68" y="152" width="13"  height="108" rx="6.5" fill="url(#handleGrad)"/>
          <rect x="71" y="156" width="4"   height="100" rx="2"   fill="rgba(255,255,255,0.38)"/>
          <rect x="79" y="152" width="2"   height="108" rx="1"   fill="rgba(0,0,0,0.07)"/>

          <!-- ▌Freezer door (bottom ~33%) -->
          <rect x="63" y="422" width="269" height="183" rx="16" fill="url(#freezerGrad)"/>
          <rect x="63" y="422" width="4"   height="183" rx="2"  fill="rgba(0,0,0,0.04)"/>
          <!-- Freezer recessed panel -->
          <rect x="82" y="440" width="232" height="147" rx="10"
                fill="none" stroke="#C4D0DC" stroke-width="1.5"/>
          <!-- Freezer handle -->
          <rect x="68" y="492" width="13"  height="68" rx="6.5" fill="url(#handleGrad)"/>
          <rect x="71" y="496" width="4"   height="60" rx="2"   fill="rgba(255,255,255,0.38)"/>
          <!-- Snowflake dots hint -->
          <circle cx="200" cy="513" r="2.5" fill="#B0C8E0" opacity="0.6"/>
          <circle cx="190" cy="520" r="1.5" fill="#B0C8E0" opacity="0.45"/>
          <circle cx="210" cy="520" r="1.5" fill="#B0C8E0" opacity="0.45"/>
          <circle cx="200" cy="527" r="2"   fill="#B0C8E0" opacity="0.55"/>

          <!-- ▌Hinges — RIGHT edge -->
          <!-- Top hinge -->
          <rect x="323" y="44"  width="16" height="30" rx="5" fill="url(#hingeGrad)"/>
          <rect x="326" y="47"  width="10" height="24" rx="3" fill="#C0C0C0"/>
          <circle cx="331" cy="59" r="3" fill="#9A9A9A"/>
          <!-- Middle hinge (between fridge and freezer) -->
          <rect x="323" y="346" width="16" height="30" rx="5" fill="url(#hingeGrad)"/>
          <rect x="326" y="349" width="10" height="24" rx="3" fill="#C0C0C0"/>
          <circle cx="331" cy="361" r="3" fill="#9A9A9A"/>
          <!-- Bottom hinge -->
          <rect x="323" y="454" width="16" height="28" rx="5" fill="url(#hingeGrad)"/>
          <rect x="326" y="457" width="10" height="22" rx="3" fill="#C0C0C0"/>
          <circle cx="331" cy="468" r="3" fill="#9A9A9A"/>

        </g><!-- end .fridge-door-group -->

      </svg>
    </a>
  </div>

  <p class="landing-hint">hover to peek &nbsp;&middot;&nbsp; click to enter</p>

</body>
</html>
